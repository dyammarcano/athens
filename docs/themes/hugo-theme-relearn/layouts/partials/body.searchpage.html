{{- $page := .page }}
{{- $title := partial "pageHelper/title.hugo" (dict "page" .page) }}
<article class="default">
  <header class="headline">
  </header>
  <h1 id="{{ $title | plainify | anchorize }}">{{ $title }}</h1>

  <search>
    <form action="javascript:triggerSearch()">
      <div class="searchform">
        <label class="a11y-only" for="R-search-by-detail">{{ T "Search" }}</label>
        <input Search-placeholder class="search-by" data-search-input id="R-search-by-detail" name="search-by"
               placeholder="{{ T " type="search"" }}">
        {{- partial "shortcodes/button.html" (dict
        "page" $page
        "type" "submit"
        "style" "secondary"
        "icon" "search"
        "content" (T "Search")
        )}}
      </div>
    </form>
  </search>
  <div class="searchhint">
  </div>
  <hr>
  <div id="R-searchresults">
  </div>

  <footer class="footline">
  </footer>
</article>
